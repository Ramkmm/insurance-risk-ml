name: Deploy Insurance App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Login Docker Hub
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 3. Build image
    - name: Build Docker Image
      run: docker build --no-cache -t ramkmm/insurance-api:latest .

    # 4. Push image
    - name: Push to Docker Hub
      run: docker push ramkmm/insurance-api:latest

    # 5. Deploy to EC2
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop insurance-app || true
          docker rm insurance-app || true
          docker pull ramkmm/insurance-api:latest
          docker run -d \
            --name insurance-app \
            -p 8000:8000 \
            -p 8501:8501 \
            ramkmm/insurance-api:latest
