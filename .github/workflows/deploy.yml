name: Deploy Insurance App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ramkmm/insurance-api:latest .

    - name: Push to Docker Hub
      run: docker push ramkmm/insurance-api:latest

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop insurance-app || true
          docker rm insurance-app || true
          docker pull ramkmm/insurance-api:latest
          docker run -d \
            --name insurance-app \
            -p 8000:8000 \
            -p 8501:8501 \
            ramkmm/insurance-api:latest
